<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima App - Open-Meteo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">🌤️ Clima App</h1>
            <p class="text-muted">Consulta el clima actual y forecast de cualquier ciudad</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Buscador principal -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="weatherForm" class="row g-3">
                            <div class="col-12">
                                <label for="cityInput" class="form-label">Ciudad</label>
                                <input type="text" class="form-control" id="cityInput" placeholder="Ej: Paris, Madrid, Buenos Aires" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="startDate" class="form-label">Fecha Inicio (opcional)</label>
                                <input type="date" class="form-control" id="startDate">
                            </div>
                            
                            <div class="col-md-6">
                                <label for="endDate" class="form-label">Fecha Fin (opcional)</label>
                                <input type="date" class="form-control" id="endDate">
                            </div>
                            
                            <div class="col-12">
                                <small class="text-muted">📅 Rango máximo: 16 días</small>
                            </div>
                            
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100" id="searchBtn">
                                    🔍 Buscar Clima
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Loading spinner -->
                <div id="loading" class="text-center py-5 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-3 text-muted">Consultando datos meteorológicos...</p>
                </div>

                <!-- Resultado del clima actual -->
                <div id="currentWeather" class="card shadow-sm mb-4 d-none">
                    <div class="card-body">
                        <h2 class="h4 mb-3" id="cityName"></h2>
                        <div class="row align-items-center">
                            <div class="col-md-6 text-center">
                                <div class="temperature-display" id="temperature"></div>
                                <div class="weather-description" id="weatherDescription"></div>
                            </div>
                            <div class="col-md-6">
                                <div class="weather-details" id="weatherDetails"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Forecast carrusel -->
                <div id="forecastSection" class="card shadow-sm d-none">
                    <div class="card-body">
                        <h3 class="h5 mb-4">Pronóstico Extendido</h3>
                        <div id="forecastCarousel" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-indicators" id="carouselIndicators"></div>
                            <div class="carousel-inner" id="carouselInner"></div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#forecastCarousel" data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#forecastCarousel" data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center mt-5 text-muted">
            <small>Datos proporcionados por Open-Meteo API</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/weather.js"></script>
</body>
</html>
